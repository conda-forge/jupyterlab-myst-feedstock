{% set version = "2.6.0" %}

package:
  name: jupyterlab-myst
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyterlab-myst/jupyterlab_myst-{{ version }}.tar.gz
  sha256: 1502e776153a43588eeb26ce04fb20a0a401805e20edbc57090c9ac932bd42e0

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - hatch-jupyter-builder >=0.5
    - hatch-nodejs-version >=0.3.2
    - hatchling >=1.5.0
    - jupyterlab >=4.0.0,<5
    - pip
    - python {{ python_min }}
  run:
    - jupyter_server >=2.0.1,<3
    - python >={{ python_min }}
  run_constrained:
    - jupyterlab >=4,<5

test:
  imports:
    - jupyterlab_myst
  commands:
    - pip check
    - jupyter labextension list
    - jupyter labextension list 1>labextensions 2>&1
    - grep -iE "jupyterlab-myst.*v{{ version.replace(".", "\\.") }}.*enabled.*OK.*jupyterlab_myst" labextensions
  requires:
    - jupyterlab >=4,<5
    - m2-grep  # [win]
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/executablebooks/jupyterlab-myst
  summary: A Myst renderer for JupyterLab
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - jupyterlab_myst/labextension/static/third-party-licenses.json

extra:
  recipe-maintainers:
    - agoose77
    - bollwyvl
    - stevejpurves
