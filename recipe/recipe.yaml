# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.7.0"
  python_check_max: "3.14"
  jupyterlab_min: "4.0.0"
  jupyterlab_max: "5.0.0"
  status_str: jupyterlab-myst.*v${{ version | replace(".", "\\.") }}.*enabled.*OK.*jupyterlab_myst

package:
  name: jupyterlab-myst
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyterlab-myst/jupyterlab_myst-${{ version }}.tar.gz
  sha256: c4e4b4b12da5a31ec6926d34ae7721f542892317011656a86f4e8fa0fbe7f367

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - hatch-jupyter-builder >=0.5
    - hatch-nodejs-version >=0.3.2
    - hatchling >=1.5.0
    - jupyterlab >=${{ jupyterlab_min }},<${{ jupyterlab_max }}
    - pip
    - python ${{ python_min }}.*
  run:
    - jupyter_server >=2.0.1,<3
    - python >=${{ python_min }}
  run_constraints:
    - jupyterlab >=${{ jupyterlab_min }},<${{ jupyterlab_max }}

tests:
  - python:
      imports: jupyterlab_myst
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - jupyterlab
        - pip
        - python ${{ python_min }}.*
    script:
      - jupyter labextension list
      - jupyter labextension list 1>labextensions 2>&1
      - python -c "import re, pathlib; assert re.search('${{ status_str }}', pathlib.Path('labextensions').read_text(encoding='utf-8'))"

about:
  summary: A Myst renderer for JupyterLab
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - jupyterlab_myst/labextension/static/third-party-licenses.json
  homepage: https://pypi.org/project/jupyterlab-myst
  repository: https://github.com/executablebooks/jupyterlab-myst

extra:
  recipe-maintainers:
    - agoose77
    - bollwyvl
    - stevejpurves
